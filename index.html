<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latihan PSAJ PPKn 2025-2026</title>
<style>
:root {
  --bg: #0d0f1a;
  --surface: #131625;
  --surface2: #1a1e30;
  --surface3: #1f243a;
  --border: rgba(100,120,220,0.18);
  --border2: rgba(100,120,220,0.35);
  --text: #e2e6f3;
  --text-muted: #7a84a8;
  --text-dim: #4a5270;
  --accent: #5b7aff;
  --accent-glow: rgba(91,122,255,0.15);
  --accent2: #3ec8a0;
  --warn: #f0c060;
  --warn-glow: rgba(240,192,96,0.12);
  --danger: #f06080;
  --success: #3ec8a0;
  --radius: 14px;
  --radius-sm: 10px;
  --trans: 0.28s cubic-bezier(0.4,0,0.2,1);

  /* fluid base font: 17px on mobile, 19px on wide desktop */
  font-size: clamp(17px, 1.5vw + 13px, 19px);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  font-size:1rem;
  line-height:1.65;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 0 4rem;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}

/* ── SCREEN WRAPPER ──
   Full width with generous side margins; no narrow max-width cap */
.screen{
  width:100%;
  max-width:900px;
  padding:1.8rem clamp(1rem, 4vw, 2.5rem);
  animation:fadeUp 0.4s ease both;
}

/* ── START SCREEN ── */
.start-wrap{
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2.5rem clamp(1rem,5vw,3rem);
  gap:0;
}
.start-badge{
  background:var(--surface2);
  border:1px solid var(--border2);
  color:var(--accent);
  font-size:clamp(11px,1.1vw,13px);
  letter-spacing:0.15em;
  text-transform:uppercase;
  padding:6px 18px;
  border-radius:24px;
  margin-bottom:2rem;
}
.start-title{
  font-size:clamp(2.2rem,6vw,3.8rem);
  font-weight:700;
  text-align:center;
  line-height:1.12;
  margin-bottom:0.7rem;
  background:linear-gradient(135deg,#7b9fff 0%,#b5caff 50%,#5b9fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.start-sub{
  color:var(--text-muted);
  text-align:center;
  font-size:clamp(0.95rem,1.5vw,1.1rem);
  margin-bottom:0.5rem;
}
.start-meta{
  display:flex;gap:clamp(0.8rem,2vw,1.5rem);
  margin:1.8rem 0 2.8rem;
  flex-wrap:wrap;justify-content:center;
}
.start-chip{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:24px;
  padding:8px 18px;
  font-size:clamp(13px,1.2vw,15px);
  color:var(--text-muted);
  display:flex;align-items:center;gap:7px;
}
.start-chip span{color:var(--text);font-weight:600}
.btn-start{
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:var(--radius);
  padding:clamp(14px,2vw,18px) clamp(44px,6vw,72px);
  font-size:clamp(1rem,1.5vw,1.15rem);
  font-weight:700;
  cursor:pointer;
  transition:var(--trans);
  letter-spacing:0.03em;
  box-shadow:0 0 32px rgba(91,122,255,0.28);
}
.btn-start:hover{background:#4a6aee;transform:translateY(-2px);box-shadow:0 0 44px rgba(91,122,255,0.42)}
.btn-start:active{transform:translateY(0)}
.deco-ring{
  width:clamp(150px,22vw,210px);
  height:clamp(150px,22vw,210px);
  border-radius:50%;border:1px solid var(--border);
  position:relative;display:flex;align-items:center;justify-content:center;
  margin-bottom:2.2rem;
}
.deco-ring::before{content:'';position:absolute;width:77%;height:77%;border-radius:50%;border:1px solid rgba(91,122,255,0.25)}
.deco-ring::after{content:'';position:absolute;width:55%;height:55%;border-radius:50%;background:var(--accent-glow);border:1px solid rgba(91,122,255,0.4)}
.deco-icon{font-size:clamp(2.2rem,4vw,3.2rem);position:relative;z-index:1}

/* ── PROGRESS BAR ── */
.progress-wrap{margin-bottom:1.6rem}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.q-count{
  font-size:clamp(13px,1.2vw,15px);
  color:var(--text-muted);
  letter-spacing:0.04em;
}
.q-points{
  font-size:clamp(13px,1.2vw,15px);
  color:var(--accent);
  background:var(--accent-glow);
  border:1px solid rgba(91,122,255,0.28);
  border-radius:14px;
  padding:3px 13px;
  font-weight:600;
}
.progress-bar{height:6px;background:var(--surface3);border-radius:6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}

/* ── QUESTION CARD ── */
.q-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:clamp(1.4rem,3vw,2rem) clamp(1.4rem,3vw,2.2rem);
  margin-bottom:1.2rem;
}
.q-num-badge{
  display:inline-block;
  background:var(--accent);
  color:#fff;
  font-size:clamp(12px,1.1vw,14px);
  font-weight:700;
  padding:4px 13px;
  border-radius:7px;
  margin-bottom:1rem;
  letter-spacing:0.06em;
}
.q-type-tag{
  display:inline-block;
  margin-left:9px;
  font-size:clamp(11px,1vw,13px);
  color:var(--text-muted);
  background:var(--surface3);
  border:1px solid var(--border);
  border-radius:6px;
  padding:3px 10px;
  vertical-align:middle;
}
.q-text{
  font-size:clamp(1rem,1.5vw,1.1rem);
  color:var(--text);
  line-height:1.75;
}
.q-text em{color:var(--accent2);font-style:italic}
.q-text strong{color:var(--warn);font-weight:600}

/* ── CHOICES ── */
.choices{display:flex;flex-direction:column;gap:0.75rem;margin-bottom:1.2rem}
.choice{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:clamp(0.9rem,1.8vw,1.2rem) clamp(1rem,2vw,1.4rem);
  cursor:pointer;
  display:flex;align-items:flex-start;gap:14px;
  transition:var(--trans);
  position:relative;overflow:hidden;
}
.choice::before{content:'';position:absolute;inset:0;background:var(--accent-glow);opacity:0;transition:opacity var(--trans)}
.choice:hover{border-color:var(--border2);transform:translateX(4px)}
.choice:hover::before{opacity:1}
.choice.selected{border-color:var(--accent);background:rgba(91,122,255,0.1)}
.choice.correct{border-color:var(--success);background:rgba(62,200,160,0.1);animation:popIn 0.3s ease}
.choice.wrong{border-color:var(--danger);background:rgba(240,96,128,0.1);animation:popIn 0.3s ease}
.choice.reveal-correct{border-color:var(--success);background:rgba(62,200,160,0.08)}
.choice.disabled{cursor:default;transform:none}
.choice-letter{
  flex-shrink:0;
  width:clamp(32px,3.5vw,40px);
  height:clamp(32px,3.5vw,40px);
  border-radius:8px;
  background:var(--surface3);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(13px,1.2vw,15px);
  font-weight:700;
  color:var(--text-muted);
  transition:var(--trans);
}
.choice.selected .choice-letter,.choice.correct .choice-letter{background:var(--accent);color:#fff;border-color:var(--accent)}
.choice.wrong .choice-letter{background:var(--danger);color:#fff;border-color:var(--danger)}
.choice.reveal-correct .choice-letter{background:var(--success);color:#fff;border-color:var(--success)}
.choice-text{
  font-size:clamp(0.95rem,1.4vw,1.05rem);
  line-height:1.6;
  color:var(--text);
  padding-top:clamp(4px,0.5vw,7px);
  flex:1;
}
.choice-icon{margin-left:auto;flex-shrink:0;font-size:1.2rem;opacity:0;transition:opacity 0.2s;padding-top:6px}
.choice.correct .choice-icon,.choice.reveal-correct .choice-icon{opacity:1;color:var(--success)}
.choice.wrong .choice-icon{opacity:1;color:var(--danger)}

/* TF choices */
.tf-choices{display:flex;gap:1rem;margin-bottom:1.2rem}
.tf-btn{
  flex:1;
  padding:clamp(1rem,2vw,1.4rem);
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:var(--surface2);
  cursor:pointer;
  font-size:clamp(0.95rem,1.4vw,1.1rem);
  font-weight:700;
  color:var(--text-muted);
  transition:var(--trans);
  text-align:center;
}
.tf-btn:hover{border-color:var(--border2);color:var(--text)}
.tf-btn.selected{border-color:var(--accent);background:rgba(91,122,255,0.1);color:var(--accent)}
.tf-btn.correct{border-color:var(--success);background:rgba(62,200,160,0.1);color:var(--success)}
.tf-btn.wrong{border-color:var(--danger);background:rgba(240,96,128,0.1);color:var(--danger)}
.tf-btn.reveal-correct{border-color:var(--success);background:rgba(62,200,160,0.08);color:var(--success)}
.tf-btn.disabled{cursor:default}

/* Multi note */
.multi-note{
  font-size:clamp(12px,1.1vw,14px);
  color:var(--warn);
  background:rgba(240,192,96,0.08);
  border:1px solid rgba(240,192,96,0.22);
  border-radius:7px;
  padding:6px 14px;
  margin-bottom:0.8rem;
  display:inline-block;
}

/* ── FEEDBACK ── */
.feedback{
  border-radius:var(--radius-sm);
  padding:clamp(0.75rem,1.5vw,1rem) clamp(1rem,2vw,1.3rem);
  font-size:clamp(0.9rem,1.3vw,1rem);
  margin-bottom:1rem;
  display:none;
  animation:fadeIn 0.3s ease;
}
.feedback.correct{display:block;background:rgba(62,200,160,0.08);border:1px solid rgba(62,200,160,0.32);color:var(--success)}
.feedback.wrong{display:block;background:rgba(240,96,128,0.08);border:1px solid rgba(240,96,128,0.32);color:var(--danger)}

/* ── HINT ── */
.hint-wrap{margin-bottom:1.2rem}
.btn-hint{
  background:none;
  border:1px solid var(--border2);
  border-radius:var(--radius-sm);
  padding:clamp(10px,1.3vw,13px) 20px;
  color:var(--text-muted);
  font-size:clamp(0.9rem,1.3vw,1rem);
  cursor:pointer;
  transition:var(--trans);
  display:flex;align-items:center;gap:8px;
  width:100%;justify-content:center;
}
.btn-hint:hover{border-color:var(--warn);color:var(--warn);background:var(--warn-glow)}
.hint-box{
  background:var(--surface2);
  border:1px solid rgba(240,192,96,0.27);
  border-radius:var(--radius-sm);
  padding:clamp(0.85rem,1.5vw,1.1rem) clamp(1rem,2vw,1.4rem);
  font-size:clamp(0.9rem,1.3vw,1rem);
  color:var(--warn);
  margin-top:0.6rem;
  display:none;
  animation:fadeIn 0.3s ease;
  line-height:1.7;
}
.hint-box.visible{display:block}

/* ── NAV BUTTONS ── */
.nav-row{display:flex;align-items:center;gap:0.8rem;margin-bottom:0.5rem}
.btn-nav{
  flex:1;
  padding:clamp(13px,1.8vw,17px) clamp(16px,2.5vw,24px);
  border-radius:var(--radius-sm);
  border:1px solid var(--border2);
  background:var(--surface2);
  color:var(--text-muted);
  font-size:clamp(0.9rem,1.3vw,1rem);
  font-weight:700;
  cursor:pointer;
  transition:var(--trans);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-nav:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.btn-nav:disabled{opacity:0.28;cursor:not-allowed;pointer-events:none}
.btn-nav.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-nav.primary:hover{background:#4a6aee;border-color:#4a6aee}
.btn-nav.finish{background:var(--accent2);border-color:var(--accent2);color:#0d0f1a;font-weight:700}
.btn-nav.finish:hover{background:#35b890;border-color:#35b890}

/* ── SUMMARY ── */
.summary-hero{text-align:center;padding:clamp(1.5rem,3vw,2.5rem) 1rem clamp(1.2rem,2vw,1.8rem)}
.score-ring{
  width:clamp(140px,18vw,170px);
  height:clamp(140px,18vw,170px);
  margin:0 auto 1.4rem;position:relative;
}
.score-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.score-ring circle{fill:none;stroke-width:10;stroke-linecap:round}
.score-ring .track{stroke:var(--surface3)}
.score-ring .fill{stroke:var(--accent);transition:stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1)}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-val{font-size:clamp(1.8rem,3.5vw,2.4rem);font-weight:700;color:var(--text)}
.score-max{font-size:clamp(12px,1.1vw,14px);color:var(--text-muted)}
.summary-grade{font-size:clamp(1.3rem,2.5vw,1.8rem);font-weight:700;margin-bottom:0.4rem}
.summary-msg{color:var(--text-muted);font-size:clamp(0.95rem,1.4vw,1.05rem);margin-bottom:1.8rem}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.9rem;margin-bottom:1.8rem}
.stat-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:clamp(0.9rem,1.8vw,1.3rem);
  text-align:center;
}
.stat-val{font-size:clamp(1.5rem,3vw,2rem);font-weight:700;margin-bottom:4px}
.stat-val.green{color:var(--success)}
.stat-val.red{color:var(--danger)}
.stat-val.blue{color:var(--accent)}
.stat-label{font-size:clamp(12px,1.1vw,14px);color:var(--text-muted)}
.review-list{display:flex;flex-direction:column;gap:0.65rem;margin-bottom:1.8rem}
.review-item{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:clamp(0.8rem,1.5vw,1.1rem) clamp(1rem,2vw,1.4rem);
  display:flex;align-items:flex-start;gap:12px;
  font-size:clamp(0.88rem,1.3vw,0.97rem);
}
.review-item.wrong-item{border-left:3px solid var(--danger)}
.review-dot{
  flex-shrink:0;width:24px;height:24px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;margin-top:2px;
}
.review-dot.w{background:rgba(240,96,128,0.2);color:var(--danger)}
.review-q{flex:1;color:var(--text-muted);line-height:1.5}
.review-q strong{color:var(--text);display:block;margin-bottom:3px;font-size:clamp(0.9rem,1.3vw,1rem)}
.section-title{
  font-size:clamp(12px,1.1vw,14px);
  text-transform:uppercase;letter-spacing:0.1em;
  color:var(--text-dim);
  margin:1.5rem 0 0.8rem;
  padding-bottom:0.5rem;
  border-bottom:1px solid var(--border);
}
.btn-retry{
  background:var(--accent);color:#fff;border:none;
  border-radius:var(--radius);
  padding:clamp(13px,1.8vw,17px) clamp(36px,5vw,56px);
  font-size:clamp(0.95rem,1.4vw,1.05rem);
  font-weight:700;cursor:pointer;transition:var(--trans);
  display:block;margin:0 auto;
}
.btn-retry:hover{background:#4a6aee;transform:translateY(-2px)}

/* footer */
.footer-copy{
  text-align:center;
  font-size:clamp(12px,1vw,13px);
  color:var(--text-dim);
  padding:1.8rem 0 0;
  letter-spacing:0.06em;
}

/* ── RESPONSIVE TWEAKS ── */
/* Tablet and below */
@media(max-width:680px){
  .tf-choices{flex-direction:column}
  .tf-btn{padding:1rem 1.2rem}
}
/* Small phones */
@media(max-width:400px){
  .start-meta{gap:0.6rem}
  .start-chip{padding:7px 12px;font-size:13px}
  .nav-row{gap:0.5rem}
}
</style>
</head>

<div id="app"></div>

<script>
const ALL_QUESTIONS = [
  {
    id:1, points:2, type:'single',
    text:'Tujuan dibentuknya BPUPKI adalah ....',
    choices:['Menyelidiki persiapan pembentukan negara Indonesia Merdeka','Mempersiapkan strategi menghadapi pasukan sekutu','Menyiapkan teks proklamasi kemerdekaan Indonesia','Mempersiapkan masuknya wilayah Indonesia ke pemerintahan Jepang'],
    answer:0,
    hint:'BPUPKI = Badan Penyelidik Usaha-usaha Persiapan Kemerdekaan Indonesia. Kata kunci ada di singkatannya.'
  },
  {
    id:2, points:2, type:'single',
    text:'Lembaga BPUPKI dibentuk pada tanggal ....',
    choices:['1 Februari 1945','1 Maret 1945','29 Mei 1945','22 Juni 1945'],
    answer:1,
    hint:'BPUPKI dibentuk oleh Jepang pada tahun 1945, tepatnya bulan Maret.'
  },
  {
    id:3, points:2, type:'single',
    text:'Perhatikan kutipan pidato Ir. Soekarno berikut:\n\n"Kita hendak mendirikan suatu negara \'semua buat semua\'. Bukan buat satu orang, bukan buat satu golongan, baik golongan bangsawan, maupun golongan yang kaya — tetapi \'semua buat semua\'.\"\n\nMakna mendalam dari kutipan pidato di atas mencerminkan prinsip ....',
    choices:['Monarki absolut','Demokrasi yang inklusif dan keadilan sosial','Persaingan ekonomi liberal','Dominasi kelompok mayoritas atas minoritas'],
    answer:1,
    hint:'"Semua buat semua" = inklusif, tidak memihak satu golongan = ciri demokrasi yang adil.'
  },
  {
    id:4, points:2, type:'single',
    text:'Pada sidang BPUPKI ke-1, seorang tokoh bangsa mengusulkan nama dasar negara Indonesia yaitu Pancasila. Beliau mencetuskan nama Pancasila atas usulan seorang teman. Tokoh bangsa yang dimaksud ialah ....',
    choices:['Soekarno','Soepomo','M. Yamin','Rajiman Wedyodiningrat'],
    answer:0,
    hint:'Tokoh yang berpidato pada 1 Juni 1945 dan mencetuskan istilah "Pancasila" sebagai dasar negara.'
  },
  {
    id:5, points:2, type:'multi',
    text:'Panitia Sembilan dibentuk pada masa reses BPUPKI dengan tugas utama menyusun naskah rancangan Pembukaan Undang-Undang Dasar. Tokoh yang menjadi anggota Panitia Sembilan adalah .... (pilih 2 jawaban yang benar)',
    choices:['Achmad Soebardjo','Wachid Hasjim','Moh. Hatta','Soekarno'],
    answer:[1,2],
    hint:'Panitia Sembilan terdiri dari 9 tokoh. Wachid Hasjim dan Moh. Hatta adalah dua di antaranya yang sering diujikan.'
  },
  {
    id:6, points:2, type:'single',
    text:'Makna Pancasila sebagai pandangan hidup bangsa Indonesia ialah ....',
    choices:['Pancasila sebagai pedoman hidup dalam penyelenggaraan negara','Pancasila sebagai panduan aktivitas masyarakat sehari-hari','Pancasila sebagai acuan dalam perumusan negara','Pancasila sebagai panduan dalam masa lalu bangsa'],
    answer:1,
    hint:'Pandangan hidup = bagaimana seseorang atau bangsa menjalani keseharian, bukan hanya penyelenggaraan negara.'
  },
  {
    id:7, points:2, type:'tf',
    text:'Kedudukan Pancasila sebagai sumber dari segala hukum memiliki makna bahwa semua produk aturan negara tidak boleh menyimpang dari nilai-nilai Pancasila.\n\nBenar atau Salah?',
    choices:['Benar (True)','Salah (False)'],
    answer:0,
    hint:'Pancasila adalah sumber dari segala sumber hukum — semua peraturan harus berlandaskan Pancasila.'
  },
  {
    id:8, points:2, type:'single',
    text:'Sekolah memiliki tata tertib agar kehidupan di sekolah berjalan dengan baik dan tidak ada tindakan-tindakan yang tercela. Pentingnya tata tertib di sekolah selaras dengan pengamalan Pancasila sila ke ....',
    choices:['Sila ke-2','Sila ke-3','Sila ke-4','Sila ke-5'],
    answer:2,
    hint:'Tata tertib berkaitan dengan musyawarah dan kesepakatan bersama — ciri Sila ke-4 tentang hikmat kebijaksanaan.'
  },

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

const LETTERS=['A','B','C','D'];
let questions=[];
let current=0;
let answers={};
let hintShown={};
let animDir='right';

function init(){
  questions=shuffle(ALL_QUESTIONS);
  current=0;
  answers={};
  hintShown={};
  render();
}

function render(){
  const app=document.getElementById('app');
  const phase=app.dataset.phase||'start';
  if(phase==='start'){renderStart(app);}
  else if(phase==='quiz'){renderQuiz(app);}
  else{renderSummary(app);}
}

function renderStart(app){
  app.innerHTML=`
  <div class="start-wrap">
    <div class="deco-ring"><span class="deco-icon">📋</span></div>
    <div class="start-badge">PPKn · TP 2025–2026</div>
    <h1 class="start-title">Latihan PSAJ PPKn</h1>
    <p class="start-sub">Uji pemahaman Pancasila, UUD, Norma &amp; Kebangsaan</p>
    <div class="start-meta">
      <div class="start-chip">📝 <span>50 Soal</span></div>
      <div class="start-chip">⏱ <span>Tanpa batas waktu</span></div>
      <div class="start-chip">🎯 <span>100 Poin</span></div>
      <div class="start-chip">🔀 <span>Soal diacak</span></div>
    </div>
    <button class="btn-start" id="btnStart">Mulai Kuis ▶</button>
  </div>
  <div class="footer-copy">© Malvin 2026</div>`;
  document.getElementById('btnStart').onclick=()=>{
    app.dataset.phase='quiz';
    init();
  };
}

function renderQuiz(app){
  const q=questions[current];
  const totalQ=questions.length;
  const pct=Math.round((current/totalQ)*100);
  const userAns=answers[current];
  const answered=userAns!==undefined;
  const isLast=current===totalQ-1;
  const isFirst=current===0;
  const choiceLetters=LETTERS.slice(0,q.choices.length);

  let choicesHTML='';
  if(q.type==='tf'){
    choicesHTML=`<div class="tf-choices">`;
    q.choices.forEach((c,i)=>{
      let cls='tf-btn';
      if(answered){
        cls+=' disabled';
        if(Array.isArray(q.answer)?q.answer.includes(i):q.answer===i) cls+=' reveal-correct';
        if(userAns===i&&!(Array.isArray(q.answer)?q.answer.includes(i):q.answer===i)) cls+=' wrong';
        if(userAns===i&&(Array.isArray(q.answer)?q.answer.includes(i):q.answer===i)) cls+=' correct';
      } else {
        if(userAns===i) cls+=' selected';
      }
      const icon=answered?((Array.isArray(q.answer)?q.answer.includes(i):q.answer===i)?'✓':''):'';
      choicesHTML+=`<button class="${cls}" data-idx="${i}" ${answered?'disabled':''}>${c} ${icon}</button>`;
    });
    choicesHTML+=`</div>`;
  } else {
    const isMulti=q.type==='multi';
    if(isMulti) choicesHTML+=`<div class="multi-note">⚡ Pilih ${q.answer.length} jawaban yang benar</div>`;
    choicesHTML+=`<div class="choices">`;
    q.choices.forEach((c,i)=>{
      let cls='choice';
      const isCorrect=Array.isArray(q.answer)?q.answer.includes(i):q.answer===i;
      if(answered){
        cls+=' disabled';
        if(isMulti){
          const ua=Array.isArray(userAns)?userAns:[];
          if(isCorrect) cls+=' reveal-correct';
          if(ua.includes(i)&&!isCorrect) cls+=' wrong';
          if(ua.includes(i)&&isCorrect) cls+=' correct';
        } else {
          if(isCorrect) cls+=' reveal-correct';
          if(userAns===i&&!isCorrect) cls+=' wrong';
          if(userAns===i&&isCorrect) cls+=' correct';
        }
      } else {
        if(isMulti){const ua=Array.isArray(userAns)?userAns:[];if(ua.includes(i))cls+=' selected';}
        else{if(userAns===i)cls+=' selected';}
      }
      const icon=answered?(isCorrect?'✓':(isMulti?(Array.isArray(userAns)&&userAns.includes(i)&&!isCorrect?'✗':''):(userAns===i&&!isCorrect?'✗':''))):'';
      choicesHTML+=`<div class="${cls}" data-idx="${i}" role="button" tabindex="${answered?-1:0}">
        <div class="choice-letter">${choiceLetters[i]}</div>
        <div class="choice-text">${c}</div>
        <div class="choice-icon">${icon}</div>
      </div>`;
    });
    choicesHTML+=`</div>`;
  }

  let feedbackHTML='';
  if(answered){
    const isCorrect=checkCorrect(q,userAns);
    feedbackHTML=`<div class="feedback ${isCorrect?'correct':'wrong'}">${isCorrect?'✓ Jawaban benar! +'+q.points+' poin':'✗ Jawaban kurang tepat. Pelajari kembali materi ini.'}</div>`;
  }

  const hintVisible=hintShown[current];
  const qTextFormatted=q.text.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');

  app.innerHTML=`
  <div class="screen" id="quizScreen">
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="q-count">Soal ${current+1} dari ${totalQ}</span>
        <span class="q-points">${q.points} poin</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="q-card">
      <div>
        <span class="q-num-badge">No. ${current+1}</span>
        <span class="q-type-tag">${q.type==='tf'?'Benar/Salah':q.type==='multi'?'Pilihan Ganda – Multi':'Pilihan Ganda'}</span>
      </div>
      <p class="q-text" style="margin-top:0.8rem">${qTextFormatted}</p>
    </div>
    ${choicesHTML}
    ${feedbackHTML}
    <div class="hint-wrap">
      <button class="btn-hint" id="btnHint">💡 ${hintVisible?'Sembunyikan Hint':'Tampilkan Hint'}</button>
      <div class="hint-box ${hintVisible?'visible':''}" id="hintBox">${q.hint}</div>
    </div>
    <div class="nav-row">
      <button class="btn-nav" id="btnPrev" ${isFirst?'disabled':''}>← Sebelumnya</button>
      <button class="btn-nav ${isLast?'finish':'primary'}" id="btnNext" ${!answered&&!isLast?'disabled':answered||isLast?'':''} ${isLast&&answered?'':''}>${isLast?'📊 Koreksi':'Berikutnya →'}</button>
    </div>
  </div>
  <div class="footer-copy">© Malvin 2026</div>`;

  const nextBtn=document.getElementById('btnNext');
  if(!answered&&!isLast) nextBtn.disabled=true;
  if(isLast&&!answered) nextBtn.disabled=true;

  document.getElementById('btnHint').onclick=()=>{
    hintShown[current]=!hintShown[current];
    renderQuiz(app);
  };
  document.getElementById('btnPrev').onclick=()=>{
    if(current>0){animDir='left';current--;renderQuiz(app);}
  };
  document.getElementById('btnNext').onclick=()=>{
    if(isLast){app.dataset.phase='summary';renderSummary(app);}
    else{animDir='right';current++;renderQuiz(app);}
  };

  if(!answered){
    if(q.type==='single'){
      document.querySelectorAll('.choice').forEach(el=>{
        el.onclick=()=>{
          const idx=parseInt(el.dataset.idx);
          answers[current]=idx;
          renderQuiz(app);
        };
      });
    } else if(q.type==='multi'){
      document.querySelectorAll('.choice').forEach(el=>{
        el.onclick=()=>{
          const idx=parseInt(el.dataset.idx);
          if(!answers[current]) answers[current]=[];
          const ua=answers[current];
          const pos=ua.indexOf(idx);
          if(pos===-1){ua.push(idx);}else{ua.splice(pos,1);}
          if(ua.length===q.answer.length){renderQuiz(app);}
          else{
            el.classList.toggle('selected');
            document.getElementById('btnNext').disabled=ua.length!==q.answer.length;
          }
        };
      });
    } else if(q.type==='tf'){
      document.querySelectorAll('.tf-btn').forEach(el=>{
        el.onclick=()=>{
          const idx=parseInt(el.dataset.idx);
          answers[current]=idx;
          renderQuiz(app);
        };
      });
    }
  }

  const scr=document.getElementById('quizScreen');
  const dir=animDir==='right'?'slideRight':'slideLeft';
  scr.style.animation=`${dir} 0.3s ease both`;
}

function checkCorrect(q,ua){
  if(q.type==='multi'){
    const a=Array.isArray(ua)?[...ua].sort():[[]];
    const b=[...q.answer].sort();
    return JSON.stringify(a)===JSON.stringify(b);
  }
  return ua===q.answer;
}

function renderSummary(app){
  let correct=0,wrong=0,totalPts=0,maxPts=0;
  const results=questions.map((q,i)=>{
    maxPts+=q.points;
    const ua=answers[i];
    const ok=ua!==undefined&&checkCorrect(q,ua);
    if(ok){correct++;totalPts+=q.points;}else{wrong++;}
    return{q,ua,ok,i};
  });
  const pct=Math.round((totalPts/maxPts)*100);
  const circ=2*Math.PI*54;
  const dash=circ-(pct/100)*circ;
  let grade='',msg='',gradeColor='';
  if(pct>=90){grade='A';msg='Luar biasa! Kamu siap menghadapi PSAJ.';gradeColor='var(--success)';}
  else if(pct>=80){grade='B';msg='Sangat bagus! Sedikit lagi sempurna.';gradeColor='var(--accent)';}
  else if(pct>=70){grade='C';msg='Cukup baik. Terus berlatih, kamu bisa!';gradeColor='var(--warn)';}
  else if(pct>=60){grade='D';msg='Perlu lebih banyak latihan. Jangan menyerah!';gradeColor='var(--warn)';}
  else{grade='E';msg='Yuk belajar lebih giat lagi! Kamu pasti bisa.';gradeColor='var(--danger)';}

  const wrongItems=results.filter(r=>!r.ok);
  const correctItems=results.filter(r=>r.ok);

  let reviewHTML='';
  if(wrongItems.length>0){
    reviewHTML+=`<div class="section-title">❌ Soal yang perlu dipelajari ulang (${wrongItems.length})</div><div class="review-list">`;
    wrongItems.forEach(r=>{
      const shortQ=r.q.text.replace(/<[^>]+>/g,'').substring(0,80)+'...';
      const correctLabel=Array.isArray(r.q.answer)?r.q.answer.map(a=>LETTERS[a]).join('&'):LETTERS[r.q.answer];
      reviewHTML+=`<div class="review-item wrong-item">
        <div class="review-dot w">✗</div>
        <div class="review-q"><strong>Soal No. ${r.i+1}</strong>${shortQ}<br><span style="color:var(--success);font-size:11px">Jawaban benar: ${correctLabel}</span></div>
      </div>`;
    });
    reviewHTML+=`</div>`;
  }

  app.innerHTML=`
  <div class="screen" id="summaryScreen">
    <div class="summary-hero">
      <div class="score-ring">
        <svg viewBox="0 0 120 120">
          <circle class="track" cx="60" cy="60" r="54"/>
          <circle class="fill" cx="60" cy="60" r="54" stroke-dasharray="${circ}" stroke-dashoffset="${dash}" id="progressCircle"/>
        </svg>
        <div class="score-center">
          <span class="score-val" id="scoreAnim">0</span>
          <span class="score-max">/ ${maxPts}</span>
        </div>
      </div>
      <div class="summary-grade" style="color:${gradeColor}">Nilai ${grade} · ${pct}%</div>
      <div class="summary-msg">${msg}</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-val green">${correct}</div><div class="stat-label">Benar</div></div>
        <div class="stat-card"><div class="stat-val red">${wrong}</div><div class="stat-label">Salah</div></div>
        <div class="stat-card"><div class="stat-val blue">${totalPts}</div><div class="stat-label">Poin</div></div>
      </div>
    </div>
    ${reviewHTML}
    <button class="btn-retry" onclick="retryQuiz()">🔄 Coba Lagi</button>
  </div>
  <div class="footer-copy">© Malvin 2026</div>`;

  let sv=0;
  const target=totalPts;
  const dur=1200;
  const step=16;
  const inc=target/(dur/step);
  const iv=setInterval(()=>{
    sv=Math.min(sv+inc,target);
    const el=document.getElementById('scoreAnim');
    if(el) el.textContent=Math.round(sv);
    if(sv>=target) clearInterval(iv);
  },step);

  const scr=document.getElementById('summaryScreen');
  scr.style.animation='popIn 0.45s ease both';
}

window.retryQuiz=function(){
  const app=document.getElementById('app');
  app.dataset.phase='quiz';
  init();
};

const app=document.getElementById('app');
app.dataset.phase='start';
renderStart(app);
</script>
